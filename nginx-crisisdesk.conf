# Reverse proxy for CrisisDesk (uvicorn on 127.0.0.1:8000)
# Copy to /etc/nginx/sites-available/crisisdesk, symlink into sites-enabled,
# then `sudo nginx -t && sudo systemctl restart nginx`.

server {
    listen 80;
    server_name your-domain-or-ip-here;   # <-- edit this

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Websocket upgrade — required for the Agent Live Feed (/ws/live)
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}

# Once this works over plain HTTP, add TLS with:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain-here
